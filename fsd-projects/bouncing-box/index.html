<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 70px;
        height: 70px;
        height: 180px;
			  background-image: url(duck.png);
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        background-size: 150%; 
        font-size: 300%;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        /* Change me! */
        left: 0px;
      }

      .board {
        height: 5vh;
        background-image: url("https://garden.spoonflower.com/c/20188456/p/f/m/Vx8ukEFrwTXYGArMHHB_ZDSBINrti_CCXpUJYIWesYmQd-jbwn3tLJOEdw/Classic%20Vintage%2080s%20Rugged%20Bear%20Camo%20Desert%20Sand.jpg");
      background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
      }

      div {
        cursor: cell;
      }
    </style>
    <!-- 	<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script> -->
  </head>

  <body class="board">
    <!-- HTML for the box -->
    <div class="box">?</div>

    <script>
      (function () {
        "use strict";
        /* global jQuery */

        //////////////////////////////////////////////////////////////////
        /////////////////// SETUP DO NOT DELETE //////////////////////////
        //////////////////////////////////////////////////////////////////

        var box = jQuery(".box"); // reference to the HTML .box element
        var board = jQuery(".board"); // reference to the HTML .board element
        var boardWidth = board.width(); // the maximum X-Coordinate of the screen
        // update the boardWidth variable when the window is resized
        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });

        // Every 50 milliseconds, call the update Function (see below)
        setInterval(update, 50);
        
        // Every time the box is clicked, call the handleBoxClick Function (see below)
        box.on("click", handleBoxClick);
        board.on('click', handleMisclick);
        // moves the Box to a new position on the screen along the X-Axis
        function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY)
        }

        // changes the text displayed on the Box
        function changeBoxText(newText) {
          box.text(newText);
        }

        //////////////////////////////////////////////////////////////////
        /////////////////// YOUR CODE BELOW HERE /////////////////////////
        //////////////////////////////////////////////////////////////////

        // TODO 2 - Variable declarations
        var positionX = 0;
        var positionY = 0.1;
        var speedY = 5;
        var points = 0;
        var speed = 10;
        var boardHeight = jQuery(window).height();
        var randNum = Math.random() * boardWidth;
        var colorStr = "rgb(50, 25, 250)";
        var interval = setInterval(update, 50);
        var click = 0;
        var condition = false;
        /**
         * This Function will be called 20 times/second.
         * Each time it is called, it should move the Box to a new location.
         * If the box drifts off the screen, turn it around!
         */
        function update() {
          moveBoxTo(positionX, positionY);
          positionX += speed;
          positionY += speedY;
          if (positionX >= boardWidth) {
            speed *= -1;
          }
          else if (positionX < 0) {
            speed *= -1;
          }
          
          if (positionY > boardHeight) {
            speedY = speedY * -1;
          }
          else if (positionY < 0) { 
            speedY = speedY * -1;
          }

        }

        /**
         * This Function will be called each time the box is clicked.
         * Each time it is called, it should perform each of the following actions:
         * - increase the points total
         * - increase the speed
         * - move the box to the left side of the screen.
         */
        function handleBoxClick() {
          positionX = randNum;
          positionY = 10;
          points += 1;
          changeBoxText(points);
          speed = 3 * points + 10;
          speedY = 3 * points + 10;
        }
        
        function handleMisclick() {
          click++;
          if (click > points + 9) {
            endgame();
            alert ("You suck, Try Again");
            location.reload();
          }
        
        function endGame() {
          clearInterval(interval);
          condition = true;
        }
        }


        
      })();
    </script>
  </body>
</html>
